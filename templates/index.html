<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Kitchen | Your Personalized AI Meal Plan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="d-flex justify-content-center align-items-center vh-100">

    <div class="p-5 text-center"
         style="
            max-width: 500px;
            width: 100%;
            border-radius: 20px;
            background: rgba(31, 41, 55, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
         ">

        <h2 class="mb-4 fw-bold">
            <i class="fa-solid fa-utensils me-2"></i>
            AI Kitchen Assistant
        </h2>

        <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">

            <input type="file" name="image" id="imageInput" class="form-control mb-3" required>
            <button type="button" class="btn btn-outline-light w-100 mb-3" onclick="showPreview()">
                Preview Image
            </button>

            <button id="submitBtn" class="btn btn-warning w-100">
                <i class="fa-solid fa-wand-magic-sparkles me-2"></i>
                Analyze Image
            </button>

            <div id="loading" class="text-center mt-3 d-none">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Your AI Assistant is cooking your recipe...</p>
            </div>

        </form>

    </div>

</div>
<!-- IMAGE PREVIEW MODAL -->
<div class="modal fade" id="previewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 700px;">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-0">
                <h5 class="modal-title">Image Preview</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center d-flex justify-content-center align-items-center" style="background:#111;">
                <img id="modalImage" class="img-fluid rounded" style="max-height: 400px; object-fit: contain;">
            </div>
        </div>
    </div>
</div>
<script>
    function showLoader() {
        document.getElementById("submitBtn").disabled = true;
        document.getElementById("loading").classList.remove("d-none");
    }

    function showPreview() {
        const input = document.getElementById('imageInput');
        const modalImage = document.getElementById('modalImage');

        if (!input.files || !input.files[0]) {
            alert("Please select an image first.");
            return;
        }

        modalImage.src = URL.createObjectURL(input.files[0]);

        const modalElement = document.getElementById('previewModal');
        const modal = new bootstrap.Modal(modalElement);
        modal.show();
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
